@let table = this.table();
@let projectedInsertTemplate = this.insertTemplate();
@let editable = this.editable();
@if (table && (!editable || projectedInsertTemplate)) {
    <app-card-list
        [cardClasses]="cardsVisible() ? cardClasses() : ''"
        [reorderable]="editable && !!table.info.orderKey"
        [editable]="editable"
        [activeId]="activeId()"
        [gap]="gap()"
        [columns]="columns()"
        [getId]="table.getId.bind(table)"
        [orderByKey]="table.info.orderKey"
        [getFilterText]="viewService()?.toString"
        [getUrl]="getUrl()"
        (orderChange)="onOrderChanged($event)"
        (itemDropped)="onItemDropped($event)"
        [insertRow]="insertRow"
        [dragDropGroup]="tableName()"
        [emptyIcon]="emptyIcon()"
        [itemClicked]="getUrl() ? onRowClick : rowClicked()">
        <ng-template #itemTemplate let-row>
            <ng-container *ngTemplateOutlet="rowTemplate();
                context: {
                    $implicit: row,
                    page: this.page(),
                    onRemove: this.removeRow.bind(this)
                }"/>
        </ng-template>
        <ng-template #insertTemplate let-functions>
            @if (projectedInsertTemplate) {
                <ng-container *ngTemplateOutlet="projectedInsertTemplate;
                    context: {
                        $implicit: functions,
                        prepareInsert: _prepareInsert.bind(this),
                        context: insertContext()
                    }"/>
            }
        </ng-template>
    </app-card-list>
}
