
<label class="column" [class.button-appearance]="appearance() === 'button'">
    <app-input-label/>
    @if (disabled()) {
        <div class="form-input">
            @if (selectedOption(); as selectedOption) {
                @if (selectedOption.icon) {
                    <app-icon [icon]="selectedOption.icon" size="smaller" class="option-icon"
                        filled
                        [title]="translateOptions() ? (selectedOption.view | localize) : selectedOption.view"
                        [attr.aria-label]="translateOptions() ? (selectedOption.view | localize) : selectedOption.view"/>
                } @else {
                    @if (translateOptions()) {
                        {{ selectedOption.view | localize }}
                    } @else {
                        {{ selectedOption.view }}
                    }
                }
            }
        </div>
    } @else {
        <div #buttonsContainer class="buttons"
            [class.dragging]="dragging()"
            [horizontalDrag]="drag"
            [horizontalDragDisabled]="disabled()">
            <div class="indicator {{color()}}-fg"
                [class.visible]="indicatorVisible()"
                [style.width]="indicatorWidth()"
                [style.transform]="indicatorTransform()"></div>
            @for (option of optionArray(); track $index) {
                <button #optionButton type="button"
                    [class.icon-option]="!!option.icon"
                    [class.active]="viewValue() === option.value"
                    (click)="selectOption(option, $event)">
                    @if (option.icon) {
                        <app-icon #optionValue [icon]="option.icon" size="sm" class="option-icon"
                            filled
                            [title]="translateOptions() ? (option.view | localize) : option.view"
                            [attr.aria-label]="translateOptions() ? (option.view | localize) : option.view"/>
                    } @else {
                        <span #optionValue>
                            @if (translateOptions()) {
                                {{ option.view | localize }}
                            } @else {
                                {{ option.view }}
                            }
                        </span>
                    }
                </button>
            }
        </div>
    }
    <app-error-message/>
</label>
