<app-drawer-router-outlet
    (onClose)="navigateHere()"
    (activated)="onActivate($event)">
    <div class="page narrow gap-4">
        <span class="h0">{{ 'SACRAMENT_MEETING_PLANNING_PAGE.TITLE' | localize }}</span>
        <div class="row">
            <app-link-button href="https://www.churchofjesuschrist.org/study/manual/general-handbook/29-meetings-in-the-church?id=title4#title4"
                icon="open"
                outside newTab type="secondary">
                <span outside>{{ 'HANDBOOK' | localize }}</span>
            </app-link-button>
        </div>
        <div class="row mb--2">
            <app-switch-select
                [value]="past()"
                [options]="pastOptions"
                translateOptions
                (valueChange)="onPastChange($event)"/>
            <app-switch-select
                [value]="previewMode()"
                [options]="previewModeOptions"
                translateOptions
                (valueChange)="onPreviewModeChange($event)"/>
        </div>
        <app-row-card-list
            tableName="sacrament_meeting"
            [getQuery]="getQuery()"
            [getUrl]="getChurchServiceUrl"
            [activeId]="activeItemId()"
            orderKey="week"
            editable
            fixedOrder>
            <ng-template #rowTemplate let-row let-page="page" let-onRemove="onRemove">
                <app-sacrament-meeting-list-row
                    [row]="row"
                    [page]="page"
                    [onRemove]="onRemove"
                    [previewMode]="previewMode()"
                    [activeItem]="activeSubItem()"/>
            </ng-template>
            <ng-template #insertTemplate let-functions let-prepareInsert="prepareInsert" let-context="context">
                <app-sacrament-meeting-list-insert
                    [insert]="functions.insert"
                    [cancel]="functions.cancel"
                    [prepareInsert]="prepareInsert"
                    [context]="context"/>
            </ng-template>
        </app-row-card-list>
    </div>
</app-drawer-router-outlet>
