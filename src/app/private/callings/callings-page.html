<app-drawer-router-outlet
    (onClose)="navigateHere()"
    (activated)="onActivate($event)">
    <div class="page narrow gap-4">
        <span class="h0">{{ 'CALLINGS_PAGE.TITLE' | localize }}</span>
        <a class="stealth card canvas-card selectable-card" routerLink="/callings/organizations">
            <div class="row no-wrap items-center m-6-8">
                <h3 class="grow-1">
                    <app-icon [icon]="organizationView.icon" filled/>
                    <span class="overflow-ellipsis">{{ 'ORGANIZATIONS_PAGE.TITLE' | localize }}</span>
                </h3>
                <app-icon class="ms-auto" icon="chevron_right"/>
            </div>
        </a>
        <h1 class="mt-8">{{ 'CALLINGS_PAGE.CURRENT_TITLE' | localize }}</h1>
        <app-row-card-list
            tableName="member_calling"
            [columns]="windowService.isSmall() ? 1 : 3"
            [getQuery]="getCurrentMemberCallingsQuery"
            [getUrl]="getMemberCallingUrl"
            [activeId]="activeMemberCallingId()"
            emptyIcon="checkmark_circle">
            <ng-template #rowTemplate let-row let-page="page" let-onRemove="onRemove">
                <app-member-calling-list-row [row]="row" [page]="page" [onRemove]="onRemove"/>
            </ng-template>
        </app-row-card-list>
        <h1 class="mt-8">{{ 'CALLINGS_PAGE.RELEASES_TITLE' | localize }}</h1>
        <app-row-card-list
            tableName="member_calling"
            [columns]="windowService.isSmall() ? 1 : 3"
            [getQuery]="getReleaseMemberCallingsQuery"
            [getUrl]="getMemberCallingUrl"
            [activeId]="activeMemberCallingId()"
            emptyIcon="checkmark_circle">
            <ng-template #rowTemplate let-row let-page="page" let-onRemove="onRemove">
                <app-member-calling-list-row [row]="row" [page]="page" [onRemove]="onRemove"/>
            </ng-template>
        </app-row-card-list>
    </div>
</app-drawer-router-outlet>
