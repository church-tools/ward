<app-drawer-router-outlet
    (onClose)="navigateHere()"
    (activated)="onActivate($event)">
    <div class="page narrow gap-4">
        <span class="h0">{{ 'CHURCH_SERVICE_PLANING_PAGE.TITLE' | translate }}</span>
        <app-switch
            [value]="showPastMeetings()"
            (valueChange)="showPastMeetings.set($event ?? false)"
            label="{{ 'CHURCH_SERVICE_PLANING_PAGE.SHOW_PAST' | translate }}"/>
        <app-row-card-list
            tableName="sacrament_meeting"
            [getQuery]="getQuery()"
            editable>
            <ng-template #rowTemplate let-row let-page="page" let-onRemove="onRemove">
                <app-sacrament-meeting-list-row [row]="row" [page]="page" [onRemove]="onRemove"/>
            </ng-template>
            <ng-template #insertTemplate let-functions let-prepareInsert="prepareInsert" let-context="context">
                <app-sacrament-meeting-list-insert
                    [insert]="functions.insert"
                    [cancel]="functions.cancel"
                    [prepareInsert]="prepareInsert"
                    [context]="context"/>
            </ng-template>
        </app-row-card-list>
    </div>
</app-drawer-router-outlet>
