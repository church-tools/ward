<!doctype html>
<html lang="{{language}}">
  <body style="margin:0;padding:0;background:{{brand.canvas}};color:{{brand.text}};font-family:{{brand.font}};">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:{{brand.canvas}};padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;border:1px solid {{brand.border}};border-radius:20px;overflow:hidden;background:{{brand.card}};box-shadow:0 10px 30px rgba(0,0,0,0.08);">
            <tr>
              <td style="background:{{brand.accent}};height:10px;line-height:10px;font-size:0;">&nbsp;</td>
            </tr>
            <tr>
              <td style="padding:32px 32px 28px;">
                <div style="font-size:13px;line-height:18px;letter-spacing:.08em;text-transform:uppercase;color:{{brand.accent}};font-weight:700;margin:0 0 8px;">Ward Tools</div>
                <h1 style="margin:0 0 16px;font-size:28px;line-height:34px;font-weight:700;">{{title}}</h1>
                <p style="margin:0 0 18px;font-size:16px;line-height:24px;color:{{brand.text}};">{{intro}}</p>
                <p style="margin:0 0 24px;font-size:15px;line-height:23px;color:{{brand.subtle}};">{{body}}</p>
                <table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 0 20px;">
                  <tr>
                    <td style="border-radius:999px;background:{{brand.accent}};">
                      <a href="{{link}}" style="display:inline-block;padding:14px 24px;border-radius:999px;color:{{brand.accentText}};text-decoration:none;font-size:15px;line-height:15px;font-weight:700;">{{buttonLabel}}</a>
                    </td>
                  </tr>
                </table>
                <p style="margin:0 0 8px;font-size:14px;line-height:21px;color:{{brand.subtle}};word-break:break-all;">{{link}}</p>
                <p style="margin:0;font-size:13px;line-height:20px;color:{{brand.subtle}};">{{footer}}</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
